name: Sync Podcast Episodes

on:
  # Weekly on Sundays at midnight UTC
  schedule:
    - cron: '0 0 * * 0'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      rebuild_index:
        description: 'Fully rebuild Pinecone index (manual use only)'
        required: false
        default: 'false'
        type: boolean
      force_episode:
        description: 'Force re-transcribe specific episode number (optional)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    # Cloud transcription takes minutes per episode; a healthy weekly run
    # finishes in well under an hour. Fail fast instead of burning 6 hours.
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ./podcast-transcriber
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-sync.txt

      - name: Run episode sync
        working-directory: ./podcast-transcriber
        env:
          # API Keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Podcast Configuration
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
          PODCAST_NAME: ${{ secrets.PODCAST_NAME }}
          PODCAST_DESCRIPTION: ${{ secrets.PODCAST_DESCRIPTION }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          # Workflow inputs
          INPUT_REBUILD_INDEX: ${{ github.event.inputs.rebuild_index }}
          INPUT_FORCE_EPISODE: ${{ github.event.inputs.force_episode }}
        run: |
          # Cloud transcription (OpenAI Whisper API) + incremental indexing
          CMD="python sync_episodes.py --cloud --index-new"

          if [ "$INPUT_REBUILD_INDEX" = "true" ]; then
            CMD="$CMD --rebuild-index"
          fi

          if [ -n "$INPUT_FORCE_EPISODE" ]; then
            # Validate input is numeric only
            if echo "$INPUT_FORCE_EPISODE" | grep -qE '^[0-9]+$'; then
              CMD="$CMD --force-episode $INPUT_FORCE_EPISODE"
            else
              echo "Error: force_episode must be a number"
              exit 1
            fi
          fi

          echo "Running: $CMD"
          $CMD

      - name: Check for new transcripts
        id: check_changes
        run: |
          git add podcast-transcriber/transcripts/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New transcripts detected:"
            git diff --cached --name-only
          fi

      - name: Commit and push new transcripts
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Get count of new files
          NEW_COUNT=$(git diff --cached --name-only | grep -c '\.md$' || echo "0")

          git commit -m "Add $NEW_COUNT new podcast transcript(s)

          Automated sync from RSS feed

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push

      - name: Summary
        env:
          HAS_CHANGES: ${{ steps.check_changes.outputs.has_changes }}
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "New transcripts were added and committed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### New Files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git log -1 --name-only --pretty=format: >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No new episodes found. All transcripts are up to date." >> $GITHUB_STEP_SUMMARY
          fi
