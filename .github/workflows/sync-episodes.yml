name: Sync Podcast Episodes

on:
  # Weekly on Sundays at midnight UTC
  schedule:
    - cron: '0 0 * * 0'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      podcast:
        description: 'Which podcast to sync'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gtm-ai-podcast
          - beauty-and-the-biz
          - ratchet-wrench-radio
          - light-reading
          - tower-talks
      limit:
        description: 'Max episodes to transcribe this run (empty = no limit)'
        required: false
        type: string
      rebuild_index:
        description: 'Fully rebuild Pinecone index (manual use only)'
        required: false
        default: 'false'
        type: boolean
      force_episode:
        description: 'Force re-transcribe specific episode number (optional)'
        required: false
        type: string

permissions:
  contents: write  # workflow commits transcripts back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    # Weekly runs handle a couple of episodes and should fail fast.
    # Dispatched backfills get a longer leash.
    timeout-minutes: ${{ github.event_name == 'schedule' && 90 || 330 }}

    strategy:
      max-parallel: 1  # jobs push commits; run serially to avoid races
      fail-fast: false
      matrix:
        include:
          # GTM podcast keeps its original config from repo secrets
          # (empty matrix values fall back to secrets below).
          - slug: gtm-ai-podcast
            rss: ''
            name: ''
            description: ''
            index: ''
          - slug: beauty-and-the-biz
            rss: 'https://rss.libsyn.com/shows/182354/destinations/1247585.xml'
            name: 'Beauty and the Biz'
            description: 'A podcast for plastic surgeons, medspa owners, and aesthetic practice leaders on growing, marketing, and managing profitable cosmetic practices, hosted by Catherine Maley'
            index: 'beauty-and-the-biz'
          - slug: ratchet-wrench-radio
            rss: 'https://feed.podbean.com/ratchetandwrenchradio/feed.xml'
            name: 'Ratchet+Wrench Radio'
            description: 'A podcast for auto repair shop owners and multi-shop operators covering shop management, growth strategy, leadership, and the business of automotive repair'
            index: 'ratchet-wrench-radio'
          # Telecom podcasts share the integrated-inference index
          # 'telecom-podcasts' under the 'telecom' namespace. The since/
          # skip_title filters are PERMANENT: without them the weekly run
          # would slowly backfill pre-window episodes (Light Reading has
          # ~850 of them) and Digital Divide episodes at 5/week.
          - slug: light-reading
            rss: 'https://feeds.acast.com/public/shows/6112c6ffaae63d001577f9d8'
            name: 'Light Reading Podcasts'
            description: 'A telecom industry podcast covering broadband, 5G, fiber, cable, cloud and network infrastructure news and analysis from Light Reading'
            index: 'telecom-podcasts'
            namespace: 'telecom'
            since: '2025-01-18'
            skip_title: '^The Divide'
          - slug: tower-talks
            rss: 'https://rss.buzzsprout.com/268781.rss'
            name: 'Tower Talks with Inside Towers'
            description: 'A podcast on wireless infrastructure, cell towers, fiber, data centers and the digital infrastructure ecosystem from Inside Towers'
            index: 'telecom-podcasts'
            namespace: 'telecom'
            since: '2025-07-18'

    env:
      # A matrix job runs only on schedule, 'all', or when its slug is selected
      SELECTED: ${{ github.event_name == 'schedule' || github.event.inputs.podcast == 'all' || github.event.inputs.podcast == matrix.slug }}

    steps:
      - name: Checkout repository
        if: env.SELECTED == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: env.SELECTED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: env.SELECTED == 'true'
        working-directory: ./podcast-transcriber
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-sync.txt

      - name: Preflight - verify OpenAI API key and connectivity
        if: env.SELECTED == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Diagnose auth/connectivity without ever printing the key
          python3 - <<'EOF'
          import os, re
          k = os.environ.get("OPENAI_API_KEY", "")
          print(f"key length: {len(k)}")
          print(f"contains whitespace/newline: {any(c.isspace() for c in k)}")
          print(f"matches expected sk- format: {bool(re.match(r'^sk-[A-Za-z0-9_-]+$', k))}")
          EOF
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://api.openai.com/v1/models \
            -H "Authorization: Bearer ${OPENAI_API_KEY}") || STATUS="curl-failed"
          echo "GET /v1/models HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::OpenAI preflight failed (status $STATUS). Check the OPENAI_API_KEY secret (expired? trailing newline?)."
            exit 1
          fi
          # Test the actual transcription endpoint with a 1-second silent MP3
          # (distinguishes SDK-level failures from endpoint/network blocks)
          pip install -q imageio-ffmpeg
          FFMPEG=$(python3 -c "import imageio_ffmpeg; print(imageio_ffmpeg.get_ffmpeg_exe())")
          "$FFMPEG" -f lavfi -i anullsrc=r=16000:cl=mono -t 1 -b:a 16k -y /tmp/preflight.mp3 2>/dev/null
          UPLOAD=$(curl -s -o /tmp/preflight_resp.txt -w "%{http_code}" --max-time 120 \
            https://api.openai.com/v1/audio/transcriptions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -F model=whisper-1 -F response_format=text -F file=@/tmp/preflight.mp3) || UPLOAD="curl-failed"
          echo "POST /v1/audio/transcriptions HTTP status: $UPLOAD"
          if [ "$UPLOAD" != "200" ]; then
            echo "Transcription endpoint response:"
            head -c 500 /tmp/preflight_resp.txt || true
            echo "::warning::Transcription endpoint preflight returned $UPLOAD"
          fi

      - name: Run episode sync
        if: env.SELECTED == 'true'
        working-directory: ./podcast-transcriber
        env:
          # API Keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Per-podcast configuration (matrix values; GTM falls back to secrets)
          RSS_FEED_URL: ${{ matrix.rss || secrets.RSS_FEED_URL }}
          PODCAST_NAME: ${{ matrix.name || secrets.PODCAST_NAME }}
          PODCAST_DESCRIPTION: ${{ matrix.description || secrets.PODCAST_DESCRIPTION }}
          PINECONE_INDEX_NAME: ${{ matrix.index || secrets.PINECONE_INDEX_NAME }}
          PINECONE_NAMESPACE: ${{ matrix.namespace }}
          TRANSCRIPTS_DIR: transcripts/${{ matrix.slug }}
          # Per-podcast episode filters (permanent for namespace podcasts)
          FILTER_SINCE: ${{ matrix.since }}
          FILTER_SKIP_TITLE: ${{ matrix.skip_title }}
          # Workflow inputs
          INPUT_REBUILD_INDEX: ${{ github.event.inputs.rebuild_index }}
          INPUT_FORCE_EPISODE: ${{ github.event.inputs.force_episode }}
          INPUT_LIMIT: ${{ github.event_name == 'schedule' && '5' || github.event.inputs.limit }}
        run: |
          # Cloud transcription (OpenAI Whisper API) + incremental indexing.
          # Built as a bash array so filter values with spaces (e.g. the
          # skip-title regex '^The Divide') survive word splitting.
          CMD=(python sync_episodes.py --cloud --index-new)

          if [ -n "$FILTER_SINCE" ]; then
            CMD+=(--since "$FILTER_SINCE")
          fi

          if [ -n "$FILTER_SKIP_TITLE" ]; then
            CMD+=(--skip-title "$FILTER_SKIP_TITLE")
          fi

          if [ -n "$INPUT_LIMIT" ]; then
            if echo "$INPUT_LIMIT" | grep -qE '^[0-9]+$'; then
              CMD+=(--limit "$INPUT_LIMIT")
            else
              echo "Error: limit must be a number"
              exit 1
            fi
          fi

          if [ "$INPUT_REBUILD_INDEX" = "true" ]; then
            CMD+=(--rebuild-index)
          fi

          if [ -n "$INPUT_FORCE_EPISODE" ]; then
            # Validate input is numeric only
            if echo "$INPUT_FORCE_EPISODE" | grep -qE '^[0-9]+$'; then
              CMD+=(--force-episode "$INPUT_FORCE_EPISODE")
            else
              echo "Error: force_episode must be a number"
              exit 1
            fi
          fi

          echo "Running: ${CMD[*]}  (podcast: ${{ matrix.slug }})"
          "${CMD[@]}"

      - name: Check for new transcripts
        if: env.SELECTED == 'true'
        id: check_changes
        run: |
          git add podcast-transcriber/transcripts/ podcast-transcriber/entities/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New transcripts detected:"
            git diff --cached --name-only
          fi

      - name: Commit and push new transcripts
        if: env.SELECTED == 'true' && steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Get count of new files
          NEW_COUNT=$(git diff --cached --name-only | grep -c '\.md$' || echo "0")

          git commit -m "Add $NEW_COUNT new transcript(s) for ${{ matrix.slug }}

          Automated sync from RSS feed

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # Retry push: concurrent podcast runs may land commits between
          # our rebase and push
          n=0
          git pull --rebase origin main
          until git push; do
            n=$((n+1))
            if [ $n -ge 3 ]; then exit 1; fi
            sleep $((n * 5))
            git pull --rebase origin main
          done

      - name: Summary
        if: env.SELECTED == 'true'
        env:
          HAS_CHANGES: ${{ steps.check_changes.outputs.has_changes }}
        run: |
          echo "## Sync Summary: ${{ matrix.slug }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "New transcripts were added and committed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### New Files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git log -1 --name-only --pretty=format: >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No new episodes found. All transcripts are up to date." >> $GITHUB_STEP_SUMMARY
          fi
